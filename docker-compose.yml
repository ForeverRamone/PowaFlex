services:
  powaflex:
    # Imagen publicada automáticamente desde GitHub (recomendado).
    # Para construir desde el código fuente, comenta "image" y descomenta "build".
    image: ghcr.io/foreverramone/powaflex:latest
    # build: .
    container_name: powaflex
    restart: unless-stopped
    ports:
      - '3860:3860'
    volumes:
      - ./data:/data
    environment:
      - TZ=Europe/Madrid
      # Cifra las credenciales (Plex/TMDB/Radarr) en disco. Pon una frase larga y
      # secreta; si la pierdes tendrás que volver a introducir las claves en Ajustes.
      # - POWAFLEX_SECRET=cambia-esto-por-una-frase-larga-y-secreta
    labels:
      - net.unraid.docker.icon=https://raw.githubusercontent.com/ForeverRamone/PowaFlex/main/assets/icon.png
