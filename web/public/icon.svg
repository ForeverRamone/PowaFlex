<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2030"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2c855"/>
      <stop offset="1" stop-color="#d9a021"/>
    </linearGradient>
    <clipPath id="stick">
      <rect x="86" y="128" width="340" height="66" rx="14"/>
    </clipPath>
  </defs>

  <!-- fondo -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect x="10" y="10" width="492" height="492" rx="96" fill="none" stroke="#35405c" stroke-width="4" opacity="0.6"/>

  <!-- claqueta: palo superior -->
  <g transform="rotate(-11 96 214)">
    <rect x="86" y="128" width="340" height="66" rx="14" fill="url(#gold)"/>
    <g clip-path="url(#stick)" fill="#0b0e14">
      <path d="M150 128 l44 0 l-34 66 l-44 0 z"/>
      <path d="M242 128 l44 0 l-34 66 l-44 0 z"/>
      <path d="M334 128 l44 0 l-34 66 l-44 0 z"/>
    </g>
  </g>

  <!-- claqueta: cuerpo -->
  <rect x="86" y="216" width="340" height="176" rx="20" fill="url(#gold)"/>

  <!-- bisagra -->
  <circle cx="112" cy="242" r="11" fill="#0b0e14"/>

  <!-- play -->
  <path d="M222 258 L222 350 L302 304 Z" fill="#0b0e14" stroke="#0b0e14" stroke-width="16" stroke-linejoin="round"/>

  <!-- marca -->
  <text x="256" y="462" text-anchor="middle" font-family="Futura, 'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="1">
    <tspan fill="#e8b53a">Powa</tspan><tspan fill="#e2e8f0">Flex</tspan>
  </text>
</svg>
